{% extends 'base.html' %}
{% block title %}LocalGems | Payment Successful{% endblock %}
{% block content %}
<div style="background: var(--bg-deep); min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 4rem 2rem; text-align: center;">
    <div style="max-width: 480px;">
        <div style="width: 80px; height: 80px; border-radius: 50%; background: rgba(34,197,94,0.1); border: 2px solid rgba(34,197,94,0.4); display: flex; align-items: center; justify-content: center; margin: 0 auto 2rem; font-size: 2rem;">&#10003;</div>
        <h1 style="font-family: 'Cormorant Garamond', serif; font-size: 3rem; color: var(--text-white); font-weight: 300; margin-bottom: 1rem;">Payment Successful</h1>
        <p style="color: var(--text-muted-light); line-height: 1.7; margin-bottom: 2.5rem;">Your plan is now active. Welcome to LocalGems — your stage is ready.</p>
        <div class="gold-divider" style="margin: 0 auto 2.5rem;"></div>
        <a href="{% url 'login' %}" class="btn btn-gold" style="color: var(--bg-deep);">Sign In to Your Account</a>
    </div>
</div>
{% endblock %}
